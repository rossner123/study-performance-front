<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>ENEM Performance</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-… " crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">
    <div class="logo-container">
        <div class="logo"><i class="fas fa-bullseye"></i></div>
        <h1>ENEM Performance</h1>
        <p>Sistema pessoal de controle e análise de estudos</p>
    </div>

    <div class="login-container">

        <div class="tabs">
            <button id="loginTab" class="active">Login</button>
            <button id="registerTab">Cadastro</button>
        </div>

        <form id="loginForm">
            <label>Email</label>
            <input type="email" id="email" placeholder="seu@email.com" required>

            <label>Senha</label>
            <input type="password" id="senha" placeholder="••••••••" class="senha" required>

            <button type="submit" class="primary-btn" id="entrar-btn">Entrar</button>
        </form>

        <form id="registerForm" style="display: none;">
            <label>Nome</label>
            <input type="text" id="nome" placeholder="Seu nome" required>
        
            <label>Email</label>
            <input type="email" id="email-registro" placeholder="seu@email.com" required>
        
            <label>Senha</label>
            <input type="password" id="senha-registro" placeholder="••••••••" required>
        
            <button type="submit" id="cadastro-btn" class="primary-btn">Cadastrar</button>
        </form>
    </div>

</div>

<script src="js/app.js"></script>
<script src="js/config.js"></script>
<script src="js/login.js"></script>
<script src="js/register.js"></script>
</body>
</html>
